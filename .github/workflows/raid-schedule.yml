name: Generate Raid Schedule Markdown

# Serialize pushes so two runs never fight over raids.md on the same branch.
concurrency:
  group: raid-schedule-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    paths:
      - 'assets/data/raids.txt'
      - 'assets/data/offnight.txt'
      - 'assets/js/raid-schedule-generator.js'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate raids.md even if no changes detected'
        required: false
        default: 'false'
        type: boolean
  schedule:
    # Run every Sunday at 9 AM UTC (4 AM EST, 1 AM PST) to remove past week's raids
    # Sunday = 0 in cron (0-6, where 0 is Sunday)
    - cron: '0 9 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Merge remote tip before generating so raids.md is produced from the latest
      # raids.txt (and we avoid commit-then-rebase conflicts on raids.md).
      - name: Sync branch with origin
        run: |
          git fetch origin "${{ github.ref_name }}"
          git checkout "${{ github.ref_name }}"
          git merge --no-edit "origin/${{ github.ref_name }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run raid-schedule-generator
        run: |
          echo "📅 Generating raid schedule..."
          echo "📁 Checking if raids.txt exists..."
          if [ -f "assets/data/raids.txt" ]; then
            echo "✅ raids.txt found"
            echo "📊 File size: $(wc -l < assets/data/raids.txt) lines"
          else
            echo "❌ raids.txt not found!"
            exit 1
          fi
          
          echo "🔧 Running raid schedule generator..."
          node assets/js/raid-schedule-generator.js
          
          echo "📄 Checking if raids.md was generated..."
          if [ -f "raids.md" ]; then
            echo "✅ raids.md generated successfully"
            echo "📊 Generated file size: $(wc -l < raids.md) lines"
          else
            echo "❌ raids.md was not generated!"
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          echo "🔍 Checking for changes in raids.md..."
          if [ ! -f "raids.md" ]; then
            echo "❌ raids.md file not found!"
            exit 1
          fi
          
          echo "📊 File info:"
          ls -lh raids.md
          echo "📝 First 10 lines of generated file:"
          head -n 10 raids.md
          
          git add raids.md
          if git diff --cached --quiet raids.md; then
            echo ""
            echo "❌ No changes detected in raids.md"
            echo "📊 This might happen if:"
            echo "   - All raids in raids.txt are in the past (filtered out)"
            echo "   - Raids have invalid date formats (skipped)"
            echo "   - The generated output is functionally identical"
            echo ""
            echo "💡 Check the logs above to see which raids were included vs skipped"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "✅ Changes detected in raids.md"
            echo "📊 Change summary:"
            git diff --cached --stat raids.md
            echo ""
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure git and push changes
        if: steps.changes.outputs.has_changes == 'true' || github.event.inputs.force_regenerate == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Set remote URL with token for authentication
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          
          # Ensure the file is staged (it should already be from previous step)
          git add raids.md
          
          git commit -m "🤖 Auto-generate raids.md from raids.txt
          Triggered by: ${{ github.event_name }}
          ${{ github.event.inputs.force_regenerate == 'true' && 'Force regenerate: true' || '' }}"
          
          # If push fails (remote moved), reset to remote tip and regenerate once — avoids
          # merge/rebase conflicts on raids.md since the file is fully derived from raids.txt.
          if ! git push origin "${{ github.ref_name }}"; then
            git fetch origin "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            node assets/js/raid-schedule-generator.js
            git add raids.md
            if git diff --cached --quiet raids.md; then
              echo "No raids.md delta after retry sync; remote already up to date."
            else
              git commit -m "🤖 Auto-generate raids.md from raids.txt (after sync)
          Triggered by: ${{ github.event_name }}
          ${{ github.event.inputs.force_regenerate == 'true' && 'Force regenerate: true' || '' }}"
            fi
            git push origin "${{ github.ref_name }}"
          fi
